# Standalone local compose for OrbStack and plain Docker validation.
# Same shape as docker-compose.yaml but published on host port 5984 and free of
# Coolify-magic-var references so plain docker compose doesn't warn about unset
# vars. CouchDB sizes come from ./local.ini, not env, to match the deployed form.
#
# Usage:
#   docker compose -f docker-compose.local.yaml --env-file .env.local up -d
#
# Coolify deploys docker-compose.yaml, not this file.

services:
  couchdb:
    image: couchdb:3.4.2
    environment:
      - COUCHDB_USER=${SERVICE_USER_COUCHDB}
      - COUCHDB_PASSWORD=${SERVICE_PASSWORD_64_COUCHDB}
    ports:
      - "5984:5984"
    volumes:
      - ./local.ini:/opt/couchdb/etc/local.ini
      - couchdb-data:/opt/couchdb/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f -u "$${COUCHDB_USER}:$${COUCHDB_PASSWORD}" http://localhost:5984/_up
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  couchdb-data:
