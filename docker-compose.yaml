# documentation: https://github.com/vrtmrz/obsidian-livesync/blob/main/docs/setup_own_server.md
# slogan: Self-hosted sync backend for Obsidian LiveSync plugin using CouchDB
# category: storage
# tags: obsidian,couchdb,sync,notes,markdown
# logo: svgs/obsidian-livesync.svg
# port: 5984
#
# Deviation from upstream PR coollabsio/coolify#9822: the canonical template
# uses `volumes: - type: bind ... content: |` to inline local.ini. That field
# is not in the Docker Compose Spec and not documented in Coolify docs. On
# Coolify v4.1.2 the parser strips `content:` from the Deployable Compose
# render and skips downstream Traefik-label injection plus SERVICE_* magic-var
# extraction for this service, leaving the container unrouted (503 at the FQDN).
# This file ships local.ini as a real file in the repo and bind-mounts it the
# normal short-form way. Same INI content, no parser surprises. See README.md
# "Why this deviates from upstream Coolify PR #9822" for the full write-up.

services:
  couchdb:
    image: couchdb:3.4.2
    environment:
      - SERVICE_FQDN_COUCHDB_5984
      - COUCHDB_USER=${SERVICE_USER_COUCHDB}
      - COUCHDB_PASSWORD=${SERVICE_PASSWORD_64_COUCHDB}
    volumes:
      - ./local.ini:/opt/couchdb/etc/local.ini
      - couchdb-data:/opt/couchdb/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f -u "$${COUCHDB_USER}:$${COUCHDB_PASSWORD}" http://localhost:5984/_up
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  couchdb-data:
