# Obsidian Self-hosted LiveSync, CouchDB backend.
# Mirrors the upstream-canonical Coolify service template (PR coollabsio/coolify#9822).
# Deploy target: Coolify (Docker Compose build pack, v4.0.0-beta.411+).
# For local OrbStack validation see docker-compose.local.yaml + ./local.ini + README.md.
#
# Coolify magic env vars:
#   SERVICE_FQDN_COUCHDB_5984    -> auto FQDN + Traefik route to container :5984
#   SERVICE_USER_COUCHDB         -> 16-char admin user, persisted across redeploys
#   SERVICE_PASSWORD_64_COUCHDB  -> 64-char admin password, persisted across redeploys

services:
  couchdb:
    image: couchdb:3.4.2
    environment:
      - SERVICE_FQDN_COUCHDB_5984
      - COUCHDB_USER=${SERVICE_USER_COUCHDB}
      - COUCHDB_PASSWORD=${SERVICE_PASSWORD_64_COUCHDB}
      # Single document size (bytes). Default 50 MB.
      - MAX_DOCUMENT_SIZE=${MAX_DOCUMENT_SIZE:-52428800}
      # HTTP request body size (bytes). Should sit slightly above MAX_DOCUMENT_SIZE. Default 64 MB.
      - MAX_HTTP_REQUEST_SIZE=${MAX_HTTP_REQUEST_SIZE:-67108864}
    volumes:
      # Coolify-specific extension: writes `content:` to a host file then bind-mounts it.
      # Plain Docker and OrbStack ignore `content:`. The local override supplies ./local.ini directly.
      - type: bind
        source: ./local.ini
        target: /opt/couchdb/etc/local.ini
        content: |
          [couchdb]
          single_node=true
          max_document_size = ${MAX_DOCUMENT_SIZE}

          [chttpd]
          require_valid_user = true
          max_http_request_size = ${MAX_HTTP_REQUEST_SIZE}

          [chttpd_auth]
          require_valid_user = true
          authentication_redirect = /_utils/session.html

          [httpd]
          WWW-Authenticate = Basic realm="couchdb"
          enable_cors = true

          [cors]
          origins = app://obsidian.md,capacitor://localhost,http://localhost
          credentials = true
          headers = accept, authorization, content-type, origin, referer
          methods = GET, PUT, POST, HEAD, DELETE
          max_age = 3600
      - couchdb-data:/opt/couchdb/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f -u "$${COUCHDB_USER}:$${COUCHDB_PASSWORD}" http://localhost:5984/_up
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  couchdb-data:
